name: CI

on:
  push:

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          autorelease: 'true'
          permissions: ${{ toJSON(permissions) }}
