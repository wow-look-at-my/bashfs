name: Block merged branches

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  id-token: write

jobs:
  block:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: wow-look-at-my/actions@branch-block#latest
        with:
          branch: ${{ github.head_ref }}
